name: Package
description: Packages binaries for deployment

inputs:
  runtime:
    description: "Binary runtime"
    required: true
  framework:
    description: ".NET framework"
    required: true
  artifact:
    description: "Binary artifact"
    required: true
  branch:
    description: "Git branch used for this build"
    required: true
  major_version:
    description: "Radarr major version"
    required: true
  version:
    description: "Radarr version"
    required: true

runs:
  using: "composite"
  steps:
    - name: Download Artifact
      uses: actions/download-artifact@v5
      with:
        name: ${{ inputs.artifact }}
        path: _output

    - name: Download UI Artifact
      uses: actions/download-artifact@v5
      with:
        name: build_ui
        path: _output/UI

    - name: Configure Environment Variables
      shell: bash
      run: |
        echo "FRAMEWORK=${{ inputs.framework }}" >> "$GITHUB_ENV"
        echo "BRANCH=${{ inputs.branch }}" >> "$GITHUB_ENV"
        echo "RADARR_MAJOR_VERSION=${{ inputs.major_version }}" >> "$GITHUB_ENV"
        echo "RADARR_VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"

    - name: Create Packages
      shell: bash
      run: $GITHUB_ACTION_PATH/package.sh

    - name: Install innosetup
      if: ${{ runner.os == 'Windows' }}
      shell: bash
      run: choco install --no-progress --limit-output --yes innosetup --version=6.4.0

    - name: Create Windows Installer
      if: startsWith(inputs.runtime, 'win')
      shell: bash
      run: ISCC.exe distribution/windows/setup/radarr.iss "//DFramework=${{ inputs.framework }}" "//DRuntime=${{ inputs.runtime }}" "//DBranchName=${{ inputs.branch }}"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-${{ inputs.runtime }}
        compression-level: 0
        if-no-files-found: error
        path: |
          _artifacts/*.exe
          _artifacts/*.tar.gz
          _artifacts/*.zip
