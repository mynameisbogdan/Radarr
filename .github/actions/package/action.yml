name: Package
description: Packages binaries for deployment

inputs:
  runtime:
    description: "Binary runtime"
    required: true
  framework:
    description: ".NET framework"
    required: true
  artifact:
    description: "Binary artifact"
    required: true
  branch:
    description: "Git branch used for this build"
    required: true
  major_version:
    description: "Radarr major version"
    required: true
  version:
    description: "Radarr version"
    required: true

runs:
  using: "composite"
  steps:
    - name: Download Artifact
      uses: actions/download-artifact@v8
      with:
        name: ${{ inputs.artifact }}
        path: _output

    - name: Download UI Artifact
      uses: actions/download-artifact@v8
      with:
        name: build_ui
        path: _output/UI

    - name: Configure Environment Variables
      shell: bash
      run: |
        echo "FRAMEWORK=${{ inputs.framework }}" >> "$GITHUB_ENV"
        echo "BRANCH=${{ inputs.branch }}" >> "$GITHUB_ENV"
        echo "RADARR_MAJOR_VERSION=${{ inputs.major_version }}" >> "$GITHUB_ENV"
        echo "RADARR_VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"

    - name: Create Packages
      shell: bash
      run: $GITHUB_ACTION_PATH/package.sh

    - name: Install innosetup
      if: runner.os == 'Windows'
      shell: cmd
      run: winget install --id JRSoftware.InnoSetup --version 6.5.4 --exact --source winget --accept-package-agreements --accept-source-agreements --disable-interactivity --silent --scope machine --force

    - name: Create Windows Installer
      if: startsWith(inputs.runtime, 'win')
      shell: cmd
      run: |
        "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" distribution/windows/setup/radarr.iss "/DFramework=${{ inputs.framework }}" "/DRuntime=${{ inputs.runtime }}" "/DBranchName=${{ inputs.branch }}"

    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: release-${{ inputs.runtime }}
        compression-level: 0
        if-no-files-found: error
        path: |
          _artifacts/*.exe
          _artifacts/*.tar.gz
          _artifacts/*.zip
