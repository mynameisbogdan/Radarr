name: Test

on:
  push:
    branches:
      - develop
      - main
    paths-ignore:
      - "src/Radarr.Api.*/openapi.json"
      - "**.md"
  pull_request:
    branches:
      - develop
    paths-ignore:
      - "src/NzbDrone.Core/Localization/Core/**"
      - "src/Radarr.Api.*/openapi.json"
      - "**.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-${{ github.event_name == 'workflow_dispatch' }}
  cancel-in-progress: true

env:
  FRAMEWORK: net9.0

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      framework: ${{ steps.variables.outputs.framework }}
      major_version: ${{ steps.variables.outputs.major_version }}
      version: ${{ steps.variables.outputs.version }}
      branch: ${{ steps.variables.outputs.branch }}
    steps:
      - name: Check out
        uses: actions/checkout@v5

      - name: Setup variables
        id: variables
        shell: bash
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: |
          VERSION=$(jq -re '.version' version.json)
          BRANCH=${BRANCH_NAME,,}

          echo "framework=${{ env.FRAMEWORK }}" >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH//\//-}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          echo "major_version=${VERSION%%.*}" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    secrets: inherit
    uses: ./.github/workflows/build.yml
    with:
      framework: ${{ needs.prepare.outputs.framework }}
      branch: ${{ needs.prepare.outputs.branch }}
      major_version: ${{ needs.prepare.outputs.major_version }}
      version: ${{ needs.prepare.outputs.version }}
